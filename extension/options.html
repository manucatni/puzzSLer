<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>puzzSLVer Options</title></head>
<body style="font-family: Arial, sans-serif; padding: 20px; background: #f2efe9; min-width: 300px;">
  <h2 style="color: #4f81bd; margin-top: 0;">puzzSLVer — Solver Toggles</h2>
  <p style="color: #555; font-size: 13px;">Uncheck a solver to disable it on its respective site.</p>
  <form id="opts">
    <label style="display:block; margin:10px 0;"><input type="checkbox" id="enabled_futo" checked> Futoshiki</label>
    <label style="display:block; margin:10px 0;"><input type="checkbox" id="enabled_renzo" checked> Renzoku</label>
    <label style="display:block; margin:10px 0;"><input type="checkbox" id="enabled_thermo" checked> Thermometers</label>
    <label style="display:block; margin:10px 0;"><input type="checkbox" id="enabled_battle" checked> Battleships</label>
    <button type="submit" style="margin-top:12px; padding:6px 20px; background:#4f81bd; color:#fff; border:none; border-radius:3px; cursor:pointer;">Save</button>
    <span id="saved" style="margin-left:10px; color:#4a4; font-size:13px; display:none;">Saved</span>
  </form>
  <script src="options.js"></script>
</body>
</html>
