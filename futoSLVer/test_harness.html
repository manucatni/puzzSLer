<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futoshiki Step Solver</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
  background: #d4d0c8; margin: 0; padding: 16px; color: #222;
  min-height: 100vh;
}
h2 { margin: 0 0 2px 0; color: #222; font-size: 20px; }
.subtitle { color: #555; font-size: 12px; margin-bottom: 10px; }

/* --- Top bar --- */
.top-bar {
  background: #f2efe9; border: 1px solid #b0aea6; border-radius: 6px;
  padding: 10px 12px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.top-bar textarea {
  flex: 1; min-width: 280px; height: 38px;
  font-family: Consolas, monospace; font-size: 11px;
  padding: 4px 6px; border: 1px solid #999; border-radius: 3px;
  background: #fff;
}
.top-bar button {
  padding: 6px 16px; background: #4f81bd; color: #fff;
  border: 1px solid #34609e; border-radius: 3px;
  cursor: pointer; font-size: 13px; font-weight: 600;
}
.top-bar button:hover { background: #3f6da8; }
#status { font-size: 12px; color: #666; }

/* --- Layout --- */
.main-row { display: flex; gap: 14px; align-items: flex-start; }
.left-col { flex: 0 0 auto; }
.right-col { flex: 1; min-width: 180px; max-width: 260px; }

/* --- Grid container --- */
.grid-wrap {
  display: inline-block; background: #fff;
  border: 2px solid #000; padding: 0;
  line-height: 0; /* prevent inline spacing */
}
.grid-row { display: flex; }

/* Number cell — matches puzzle-futoshiki.com style */
.num-cell {
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px;
  font-family: Arial, Helvetica, sans-serif;
  background: #fff; position: relative;
}
/* Inner border lines using a nested approach */
.num-cell .inner {
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px;
  border-right: 1px solid #000;
  border-bottom: 1px solid #000;
}
/* Last column: no right border */
.grid-row:last-child .num-cell .inner { border-bottom: none; }

.num-cell.given .inner { color: #000; font-weight: bold; font-size: 20px; }
.num-cell.solved .inner { color: rgb(10,110,189); font-weight: bold; font-size: 20px; }
.num-cell.solved.changed .inner { background: #e6ffe6; }
.num-cell.unsolved .inner { color: #888; font-size: 9px; line-height: 1.1; padding: 1px; word-break: break-all; }
/* Override right border for last column */
.grid-row .num-cell:last-child .inner { border-right: none; }

/* Inequality cells — sitting BETWEEN number cells */
.ineq-h {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 40px;
  font-size: 18px; color: #000; font-weight: bold;
  font-family: Arial, sans-serif;
  /* no border — these are gaps between number cells */
}
.ineq-v {
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 20px;
  font-size: 14px; color: #000; font-weight: bold;
  font-family: Arial, sans-serif;
  line-height: 1; padding: 0; margin: 0;
}
/* Nudge vertical triangles to sit visually centered */
.ineq-v.down-caret { transform: translateY(1px); }
.ineq-v.up-caret { transform: translateY(-1px); }
.ineq-blank-h { width: 22px; height: 40px; }
.ineq-blank-v { width: 40px; height: 20px; }
.ineq-corner { width: 22px; height: 20px; }

/* --- Steps Panel --- */
.steps-panel {
  background: #f2efe9; border: 1px solid #b0aea6;
  border-radius: 6px; padding: 10px;
}
.steps-panel h3 {
  margin: 0 0 6px 0; font-size: 14px; color: #222;
  padding-bottom: 5px; border-bottom: 2px solid #4f81bd;
}
.step-btn {
  display: block; width: 100%; padding: 5px 8px; margin-bottom: 3px;
  background: #e3e0d8; border: 1px solid #b0aea6; border-radius: 3px;
  cursor: pointer; text-align: left; font-size: 12px; color: #333;
  transition: background 0.1s;
}
.step-btn:hover { background: #d0cdc3; border-color: #4f81bd; }
.step-btn.disabled { opacity: 0.45; cursor: default; }
.step-btn .step-num { display: inline-block; width: 22px; color: #888; font-weight: bold; }
.step-btn .step-tech { font-weight: 600; }
.step-list { max-height: 500px; overflow-y: auto; }

.stats {
  font-size: 12px; margin-top: 6px; padding: 6px 8px;
  background: #f2efe9; border: 1px solid #b0aea6;
  border-radius: 4px; color: #555;
}
.stats .solved-count { color: #375623; font-weight: bold; }
.stats .unsolved-count { color: #b85; font-weight: bold; }

#log {
  background: #fff; border: 1px solid #b0aea6; border-radius: 4px;
  padding: 6px; height: 50px; overflow-y: auto;
  font-family: Consolas, monospace; font-size: 11px; color: #555;
  margin-top: 8px;
}
</style>
</head>
<body>

<h2>Futoshiki &mdash; Learn to Solve</h2>
<div class="subtitle">Click a technique on the right to apply it once. You drive the solving order.</div>

<div class="top-bar">
  <textarea id="puzzleInput" spellcheck="false"></textarea>
  <button onclick="loadPuzzle()">Load Puzzle</button>
  <span id="status">Ready</span>
</div>

<div class="main-row">
  <div class="left-col">
    <div id="gridContainer"></div>
    <div class="stats" id="stats">Load a puzzle to begin.</div>
  </div>
  <div class="right-col">
    <div class="steps-panel">
      <h3>Techniques</h3>
      <div class="step-list" id="stepList"></div>
    </div>
  </div>
</div>

<div id="log">&nbsp;</div>

<script>
// ========== DEFAULT PUZZLE ==========
const DEFAULT = "0D,0,0L,0,0R,9,0L,0,0L,0D,0,0,0D,0,0DL,4,5,0L,0,0U,0U,0UD,0,3,0D,0D,0R,7,0D,0,0,0D,0UL,0R,5,0U,0,14,11,0D,10,0,1,0RD,7,0D,0,0D,0UL,12,0,0D,0,0D,0,0L,0U,14,0R,0,0,0D,0RL,0,0UD,0L,0,0U,0DL,0,0,0L,0L,0,0U,9,0,0R,0D,0D,0,0U,0L,6R,0,0,0L,0,0U,0,0,0D,0U,0,0,0U,0U,0,0D,0D,0D,0,0L,0U,0,0D,0,0,0,6,0D,0D,0L,0L,0,0,0R,0U,0U,0,0D,0,0DL,0R,0R,0D,0,0D,0L,0U,0R,0,0U,0U,0,0R,0U,0,6,0,0,0D,0L,0,0,12D,0L,0L,0R,11,13,0,0D,0,9,0,0L,0,5L,0,0,0,0,0,0U,7,0L,0RDL,0U,0D,0U,0L,0,8,0,14,0L,0R,0U,0,0,0,0D,0,0D,0,0,10,0R,0,0,0,0UL,0,14,8UR,0R,5,0,0L,12R,0,0R,0D,0,1,0,0U,0UDL,0L,2,0,0,0R,0U,0UR,0R,0,0R,0UR,0R,0,0U,0,0U";

// ========== PARSER ==========
function parsePuzzle(str) {
    const entries = str.split(',').map(s => s.trim()).filter(s => s.length > 0);
    const size = Math.round(Math.sqrt(entries.length));
    if (size * size !== entries.length)
        throw new Error("Not a square (" + entries.length + " entries)");
    const task = [], conditions = [];
    for (let r = 0; r < size; r++) {
        task[r] = []; conditions[r] = [];
        for (let c = 0; c < size; c++) {
            const m = entries[r * size + c].match(/^(\d+)(.*)$/);
            if (!m) throw new Error("Bad entry at " + r + "," + c);
            task[r][c] = parseInt(m[1]);
            const d = m[2] || '';
            const cond = {};
            if (d.includes('U')) cond.u = true;
            if (d.includes('D')) cond.d = true;
            if (d.includes('L')) cond.l = true;
            if (d.includes('R')) cond.r = true;
            conditions[r][c] = cond;
        }
    }
    return { size, task, conditions };
}

// ========== DOMAIN HELPERS ==========
function cloneDomains(d) { return d.map(r => r.map(c => [...c])); }

function initDomains(task) {
    const size = task.length;
    return Array.from({ length: size }, (_, r) =>
        Array.from({ length: size }, (_, c) =>
            task[r][c] !== 0 ? [task[r][c]] :
                Array.from({ length: size }, (_, i) => i + 1)
        )
    );
}

function isSolved(d) {
    for (let r = 0; r < d.length; r++)
        for (let c = 0; c < d.length; c++)
            if (d[r][c].length !== 1) return false;
    return true;
}

function countSolved(d) {
    let n = 0;
    for (let r = 0; r < d.length; r++)
        for (let c = 0; c < d.length; c++)
            if (d[r][c].length === 1) n++;
    return n;
}

// ========== TECHNIQUE FUNCTIONS ==========
const TECHNIQUES = [];

function register(name, fn) {
    TECHNIQUES.push({ name, fn });
}

// ----- 1. Naked Singles -----
register('Naked Singles', function(d, cond, S) {
    let changed = false;
    const nd = cloneDomains(d);
    for (let r = 0; r < S; r++) for (let c = 0; c < S; c++) {
        if (nd[r][c].length === 1) {
            const v = nd[r][c][0];
            for (let i = 0; i < S; i++) {
                if (i !== c && nd[r][i].includes(v)) { nd[r][i] = nd[r][i].filter(x => x !== v); changed = true; }
                if (i !== r && nd[i][c].includes(v)) { nd[i][c] = nd[i][c].filter(x => x !== v); changed = true; }
            }
        }
    }
    return { changed, domains: nd };
});

// ----- 2. Inequality Propagation -----
register('Inequality Propagation', function(d, cond, S) {
    let changed = false;
    const nd = cloneDomains(d);
    for (let r = 0; r < S; r++) for (let c = 0; c < S; c++) {
        const mx = Math.max(...nd[r][c]);
        const nb = [{ k: 'u', nr: r - 1, nc: c }, { k: 'd', nr: r + 1, nc: c }, { k: 'l', nr: r, nc: c - 1 }, { k: 'r', nr: r, nc: c + 1 }];
        for (const n of nb) {
            if (cond[r][c][n.k] && nd[n.nr] && nd[n.nr][n.nc]) {
                if (nd[n.nr][n.nc].length === 0) continue;
                const pn = nd[n.nr][n.nc].length;
                nd[n.nr][n.nc] = nd[n.nr][n.nc].filter(nv => nv < mx);
                if (nd[n.nr][n.nc].length !== pn) changed = true;
                const pc = nd[r][c].length;
                nd[r][c] = nd[r][c].filter(cv => cv > Math.min(...nd[n.nr][n.nc]));
                if (nd[r][c].length !== pc) changed = true;
            }
        }
    }
    return { changed, domains: nd };
});

// ----- 3. Hidden Singles -----
register('Hidden Singles', function(d, cond, S) {
    let changed = false;
    const nd = cloneDomains(d);
    for (let i = 0; i < S; i++) {
        const row = Array.from({ length: S }, (_, c) => ({ r: i, c }));
        const col = Array.from({ length: S }, (_, r) => ({ r, c: i }));
        for (const cells of [row, col]) for (let v = 1; v <= S; v++) {
            const pc = cells.filter(cell => nd[cell.r][cell.c].includes(v));
            if (pc.length === 1) { const t = pc[0]; if (nd[t.r][t.c].length > 1) { nd[t.r][t.c] = [v]; changed = true; } }
        }
    }
    return { changed, domains: nd };
});

// ----- 4. Naked Subsets -----
register('Naked Subsets', function(d, cond, S) {
    let changed = false;
    const nd = cloneDomains(d);
    function getCombinations(arr, k) { const r = []; function h(s, c) { if (c.length === k) { r.push(c); return; } if (arr.length - s < k - c.length) return; for (let i = s; i < arr.length; i++) h(i + 1, [...c, arr[i]]); } h(0, []); return r; }
    function processCells(cells) {
        let c2 = false;
        const uns = cells.filter(cell => nd[cell.r][cell.c].length > 1);
        for (let k = 2; k <= S - 1; k++) {
            const vc = uns.filter(cell => nd[cell.r][cell.c].length <= k);
            if (vc.length < k) continue;
            for (const combo of getCombinations(vc, k)) {
                const set = new Set(); let eo = false;
                for (const cell of combo) { for (const v of nd[cell.r][cell.c]) { set.add(v); if (set.size > k) { eo = true; break; } } if (eo) break; }
                if (!eo && set.size === k) {
                    const vs = Array.from(set);
                    for (const oc of uns) { if (!combo.some(g => g.r === oc.r && g.c === oc.c)) { const ol = nd[oc.r][oc.c].length; nd[oc.r][oc.c] = nd[oc.r][oc.c].filter(v => !vs.includes(v)); if (nd[oc.r][oc.c].length !== ol) c2 = true; } }
                }
            }
        }
        return c2;
    }
    for (let i = 0; i < S; i++) { const row = Array.from({ length: S }, (_, c) => ({ r: i, c })); const col = Array.from({ length: S }, (_, r) => ({ r, c: i })); if (processCells(row)) changed = true; if (processCells(col)) changed = true; }
    return { changed, domains: nd };
});

// ----- 5. Hidden Subsets -----
register('Hidden Subsets', function(d, cond, S) {
    let changed = false;
    const nd = cloneDomains(d);
    function getCombinations(arr, k) { const r = []; function h(s, c) { if (c.length === k) { r.push(c); return; } if (arr.length - s < k - c.length) return; for (let i = s; i < arr.length; i++) h(i + 1, [...c, arr[i]]); } h(0, []); return r; }
    function processCells(cells) {
        let c2 = false;
        const uns = cells.filter(cell => nd[cell.r][cell.c].length > 1);
        if (uns.length < 2) return false;
        for (let k = 2; k <= Math.min(S - 1, uns.length); k++) {
            for (const combo of getCombinations(uns, k)) {
                const nums = new Set();
                for (const cell of combo) for (const v of nd[cell.r][cell.c]) nums.add(v);
                if (nums.size !== k) continue;
                let only = true;
                for (const v of nums) { for (const cell of uns) { if (combo.some(g => g.r === cell.r && g.c === cell.c)) continue; if (nd[cell.r][cell.c].includes(v)) { only = false; break; } } if (!only) break; }
                if (only) { for (const cell of combo) { const ol = nd[cell.r][cell.c].length; nd[cell.r][cell.c] = nd[cell.r][cell.c].filter(x => nums.has(x)); if (nd[cell.r][cell.c].length !== ol) c2 = true; } }
            }
        }
        return c2;
    }
    for (let i = 0; i < S; i++) { const row = Array.from({ length: S }, (_, c) => ({ r: i, c })); const col = Array.from({ length: S }, (_, r) => ({ r, c: i })); if (processCells(row)) changed = true; if (processCells(col)) changed = true; }
    return { changed, domains: nd };
});

// ----- 6. Inequality Chains -----
register('Inequality Chains', function(d, cond, S) {
    let changed = false;
    const nd = cloneDomains(d);
    function processChain(sr, sc, dr, dc) {
        const chain = [{ r: sr, c: sc }]; let cr = sr, cc = sc;
        while (true) {
            const nr = cr + dr, nc = cc + dc;
            if (nr < 0 || nr >= S || nc < 0 || nc >= S) break;
            const cnd = cond[cr][cc];
            let dk; if (dr === -1 && dc === 0) dk = 'u'; else if (dr === 1 && dc === 0) dk = 'd'; else if (dr === 0 && dc === -1) dk = 'l'; else if (dr === 0 && dc === 1) dk = 'r';
            if (!cnd || !cnd[dk]) break;
            chain.push({ r: nr, c: nc }); cr = nr; cc = nc;
        }
        if (chain.length < 2) return false;
        const L = chain.length; let c2 = false;
        for (let pos = 0; pos < L; pos++) { const cell = chain[pos]; const pl = nd[cell.r][cell.c].length; nd[cell.r][cell.c] = nd[cell.r][cell.c].filter(v => v >= L - pos && v <= S - pos); if (nd[cell.r][cell.c].length !== pl) c2 = true; }
        return c2;
    }
    for (let r = 0; r < S; r++) for (let c = 0; c < S; c++) { if (processChain(r, c, 0, 1)) changed = true; if (processChain(r, c, 1, 0)) changed = true; }
    return { changed, domains: nd };
});

// ----- 7. Forced Min/Max -----
register('Forced Min/Max', function(d, cond, S) {
    let changed = false;
    const nd = cloneDomains(d);
    for (let r = 0; r < S; r++) for (let c = 0; c < S; c++) {
        const cnd = cond[r][c]; if (!cnd) continue;
        let gt = 0; if (cnd.u) gt++; if (cnd.d) gt++; if (cnd.l) gt++; if (cnd.r) gt++;
        if (gt >= 2) { const pl = nd[r][c].length; nd[r][c] = nd[r][c].filter(v => v >= gt + 1); if (nd[r][c].length !== pl) changed = true; }
    }
    for (let r = 0; r < S; r++) for (let c = 0; c < S; c++) {
        let lt = 0;
        if (r > 0 && cond[r - 1][c] && cond[r - 1][c].d) lt++;
        if (r < S - 1 && cond[r + 1][c] && cond[r + 1][c].u) lt++;
        if (c > 0 && cond[r][c - 1] && cond[r][c - 1].r) lt++;
        if (c < S - 1 && cond[r][c + 1] && cond[r][c + 1].l) lt++;
        if (lt >= 2) { const pl = nd[r][c].length; nd[r][c] = nd[r][c].filter(v => v <= S - lt); if (nd[r][c].length !== pl) changed = true; }
    }
    return { changed, domains: nd };
});

// ----- 8. X-Wing -----
register('X-Wing', function(d, cond, S) {
    let changed = false;
    const nd = cloneDomains(d);
    for (let v = 1; v <= S; v++) {
        const rwc = [];
        for (let r = 0; r < S; r++) { const cols = []; for (let c = 0; c < S; c++) if (nd[r][c].includes(v)) cols.push(c); if (cols.length === 2) rwc.push({ row: r, cols }); }
        for (let i = 0; i < rwc.length; i++) for (let j = i + 1; j < rwc.length; j++) {
            const a = rwc[i], b = rwc[j];
            if (a.cols[0] === b.cols[0] && a.cols[1] === b.cols[1]) { for (let r = 0; r < S; r++) { if (r === a.row || r === b.row) continue; for (const col of a.cols) if (nd[r][col].includes(v)) { nd[r][col] = nd[r][col].filter(x => x !== v); changed = true; } } }
        }
    }
    for (let v = 1; v <= S; v++) {
        const cwr = [];
        for (let c = 0; c < S; c++) { const rows = []; for (let r = 0; r < S; r++) if (nd[r][c].includes(v)) rows.push(r); if (rows.length === 2) cwr.push({ col: c, rows }); }
        for (let i = 0; i < cwr.length; i++) for (let j = i + 1; j < cwr.length; j++) {
            const a = cwr[i], b = cwr[j];
            if (a.rows[0] === b.rows[0] && a.rows[1] === b.rows[1]) { for (let c = 0; c < S; c++) { if (c === a.col || c === b.col) continue; for (const row of a.rows) if (nd[row][c].includes(v)) { nd[row][c] = nd[row][c].filter(x => x !== v); changed = true; } } }
        }
    }
    return { changed, domains: nd };
});

// ----- 9. Swordfish -----
register('Swordfish', function(d, cond, S) {
    let changed = false;
    const nd = cloneDomains(d);
    for (let v = 1; v <= S; v++) {
        const rwc = [];
        for (let r = 0; r < S; r++) { const cols = []; for (let c = 0; c < S; c++) if (nd[r][c].includes(v)) cols.push(c); if (cols.length >= 2 && cols.length <= 3) rwc.push({ row: r, cols }); }
        for (let i = 0; i < rwc.length; i++) for (let j = i + 1; j < rwc.length; j++) for (let k = j + 1; k < rwc.length; k++) {
            const a = rwc[i], b = rwc[j], cc = rwc[k];
            const all = new Set([...a.cols, ...b.cols, ...cc.cols]);
            if (all.size === 3) { const ca = Array.from(all); for (let r = 0; r < S; r++) { if (r === a.row || r === b.row || r === cc.row) continue; for (const col of ca) if (nd[r][col].includes(v)) { nd[r][col] = nd[r][col].filter(x => x !== v); changed = true; } } }
        }
    }
    for (let v = 1; v <= S; v++) {
        const cwr = [];
        for (let c = 0; c < S; c++) { const rows = []; for (let r = 0; r < S; r++) if (nd[r][c].includes(v)) rows.push(r); if (rows.length >= 2 && rows.length <= 3) cwr.push({ col: c, rows }); }
        for (let i = 0; i < cwr.length; i++) for (let j = i + 1; j < cwr.length; j++) for (let k = j + 1; k < cwr.length; k++) {
            const a = cwr[i], b = cwr[j], cc = cwr[k];
            const all = new Set([...a.rows, ...b.rows, ...cc.rows]);
            if (all.size === 3) { const ra = Array.from(all); for (let c = 0; c < S; c++) { if (c === a.col || c === b.col || c === cc.col) continue; for (const row of ra) if (nd[row][c].includes(v)) { nd[row][c] = nd[row][c].filter(x => x !== v); changed = true; } } }
        }
    }
    return { changed, domains: nd };
});

// ----- 10. Full House -----
register('Full House', function(d, cond, S) {
    let changed = false;
    const nd = cloneDomains(d);
    for (let r = 0; r < S; r++) {
        const pl = [], us = [];
        for (let c = 0; c < S; c++) { if (nd[r][c].length === 1) pl.push(nd[r][c][0]); else us.push(c); }
        if (us.length === 1) { for (let v = 1; v <= S; v++) { if (!pl.includes(v)) { nd[r][us[0]] = [v]; changed = true; break; } } }
    }
    for (let c = 0; c < S; c++) {
        const pl = [], us = [];
        for (let r = 0; r < S; r++) { if (nd[r][c].length === 1) pl.push(nd[r][c][0]); else us.push(r); }
        if (us.length === 1) { for (let v = 1; v <= S; v++) { if (!pl.includes(v)) { nd[us[0]][c] = [v]; changed = true; break; } } }
    }
    return { changed, domains: nd };
});

// ----- 11. Contradiction Testing -----
register('Contradiction Testing', function(d, cond, S) {
    let best = null, bestCnt = S + 1;
    for (let r = 0; r < S; r++) for (let c = 0; c < S; c++) {
        const len = d[r][c].length;
        if (len >= 2 && len <= 3 && len < bestCnt) { bestCnt = len; best = { r, c }; }
    }
    if (!best) return { changed: false, domains: d };
    const { r, c } = best;
    let changed = false;
    const nd = cloneDomains(d);
    const otherTechs = TECHNIQUES.filter(t => t.name !== 'Contradiction Testing');
    for (const tv of [...nd[r][c]]) {
        const testD = cloneDomains(nd);
        testD[r][c] = [tv];
        let progress = true; let attempts = 0;
        while (progress && attempts < 30) {
            progress = false; attempts++;
            for (const tech of otherTechs) {
                const res = tech.fn(testD, cond, S);
                if (res.changed) progress = true;
            }
            let bad = false;
            for (let rr = 0; rr < S && !bad; rr++) for (let cc = 0; cc < S && !bad; cc++) if (testD[rr][cc].length === 0) bad = true;
            if (bad) { progress = false; break; }
            let allDone = true;
            for (let rr = 0; rr < S && allDone; rr++) for (let cc = 0; cc < S && allDone; cc++) if (testD[rr][cc].length !== 1) allDone = false;
            if (allDone) break;
        }
        let contradiction = false;
        for (let rr = 0; rr < S && !contradiction; rr++) for (let cc = 0; cc < S && !contradiction; cc++) if (testD[rr][cc].length === 0) contradiction = true;
        if (contradiction) { nd[r][c] = nd[r][c].filter(v => v !== tv); changed = true; }
    }
    return { changed, domains: nd };
});

// ========== INTERACTIVE STATE ==========
let currentState = null;
let currentParsed = null;

function renderGrid(containerId, task, conditions, domains, changedCells) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const size = task.length;
    const wrapper = document.createElement('div');
    wrapper.className = 'grid-wrap';

    // Last column index for removing right border
    const lastCol = size - 1;
    const lastRow = size - 1;

    for (let gr = 0; gr < 2 * size - 1; gr++) {
        const row = document.createElement('div');
        row.className = 'grid-row';

        // Check if this is an even row (number + horizontal ineq) or odd row (vertical ineq)
        const isNumRow = gr % 2 === 0;

        for (let gc = 0; gc < 2 * size - 1; gc++) {
            const isNumCol = gc % 2 === 0;

            if (isNumRow && isNumCol) {
                // Number cell
                const r = gr / 2, c = gc / 2;
                const cell = document.createElement('div');
                cell.className = 'num-cell';
                const inner = document.createElement('div');
                inner.className = 'inner';

                const isGiven = task[r][c] !== 0;
                if (domains) {
                    const dom = domains[r][c];
                    if (dom.length === 1) {
                        inner.textContent = dom[0];
                        cell.className += isGiven ? ' given' : ' solved';
                        if (changedCells && changedCells.has(r + ',' + c)) cell.className += ' changed';
                    } else if (dom.length > 0) {
                        cell.className += ' unsolved';
                        inner.textContent = dom.join(' ');
                    }
                } else {
                    inner.textContent = isGiven ? task[r][c] : '';
                    cell.className += isGiven ? ' given' : '';
                }
                cell.appendChild(inner);
                row.appendChild(cell);

            } else if (isNumRow && !isNumCol) {
                // Horizontal inequality between number cells
                const r = gr / 2, cL = (gc - 1) / 2, cR = (gc + 1) / 2;
                const cell = document.createElement('div');
                if (conditions[r][cL] && conditions[r][cL].r)
                    { cell.className = 'ineq-h'; cell.textContent = '\u25B6'; }
                else if (conditions[r][cR] && conditions[r][cR].l)
                    { cell.className = 'ineq-h'; cell.textContent = '\u25C0'; }
                else
                    cell.className = 'ineq-blank-h';
                row.appendChild(cell);

            } else if (!isNumRow && isNumCol) {
                // Vertical inequality between number rows
                const c = gc / 2, rT = (gr - 1) / 2, rB = (gr + 1) / 2;
                const cell = document.createElement('div');
                if (conditions[rT] && conditions[rT][c] && conditions[rT][c].d)
                    { cell.className = 'ineq-v down-caret'; cell.textContent = '\u25BC'; }
                else if (conditions[rB] && conditions[rB][c] && conditions[rB][c].u)
                    { cell.className = 'ineq-v up-caret'; cell.textContent = '\u25B2'; }
                else
                    cell.className = 'ineq-blank-v';
                row.appendChild(cell);
            } else {
                // Corner cell (odd row + odd col) — spacer to keep columns aligned
                const cell = document.createElement('div');
                cell.className = 'ineq-corner';
                row.appendChild(cell);
            }
        }
        wrapper.appendChild(row);
    }
    container.appendChild(wrapper);
}

function updateStats() {
    if (!currentState) return;
    const d = currentState.domains;
    const S = d.length;
    let solved = 0;
    for (let r = 0; r < S; r++) for (let c = 0; c < S; c++) if (d[r][c].length === 1) solved++;
    const total = S * S;
    document.getElementById('stats').innerHTML =
        '<span class="solved-count">Solved: ' + solved + '/' + total + ' (' + (solved / total * 100).toFixed(1) + '%)</span>' +
        ' | <span class="unsolved-count">Unsolved: ' + (total - solved) + '</span>' +
        (solved === total ? ' &#10003; Complete!' : '');
}

function refreshDisplay(changedSet) {
    if (!currentParsed) return;
    renderGrid('gridContainer', currentParsed.task, currentParsed.conditions, currentState.domains, changedSet);
    updateStats();
}

function applyTechnique(name) {
    if (!currentState) return;
    const tech = TECHNIQUES.find(t => t.name === name);
    if (!tech) return;

    const before = currentState.domains;
    const result = tech.fn(currentState.domains, currentState.conditions, currentState.size);

    if (result.changed) {
        const changed = new Set();
        for (let r = 0; r < currentState.size; r++) for (let c = 0; c < currentState.size; c++) {
            if (JSON.stringify(before[r][c]) !== JSON.stringify(result.domains[r][c])) changed.add(r + ',' + c);
        }
        currentState.domains = result.domains;
        refreshDisplay(changed);
        if (isSolved(currentState.domains)) {
            document.getElementById('status').textContent = 'Puzzle solved!';
            document.getElementById('log').innerHTML = '<div style="color:#375623;">Puzzle solved! All cells filled.</div>';
        } else {
            document.getElementById('status').textContent = 'Applied "' + name + '" — ' + changed.size + ' cell(s) changed';
            document.getElementById('log').innerHTML = '<div>Applied <b>' + name + '</b> — ' + changed.size + ' cell(s) changed. ' + countSolved(result.domains) + '/' + (currentState.size * currentState.size) + ' solved.</div>';
        }
        updateButtonStates();
    } else {
        document.getElementById('status').textContent = '"' + name + '" made no changes';
        document.getElementById('log').innerHTML = '<div><b>' + name + '</b> made no changes. Try another technique.</div>';
    }
}

function updateButtonStates() {
    document.querySelectorAll('.step-btn').forEach(btn => {
        if (btn.dataset.tech === 'Reset') return;
        if (currentState && isSolved(currentState.domains)) btn.classList.add('disabled');
        else btn.classList.remove('disabled');
    });
}

function buildTechniqueButtons() {
    const list = document.getElementById('stepList');
    list.innerHTML = '';
    TECHNIQUES.forEach((tech, i) => {
        const btn = document.createElement('button');
        btn.className = 'step-btn';
        btn.dataset.tech = tech.name;
        btn.innerHTML = '<span class="step-num">' + (i + 1) + '.</span> <span class="step-tech">' + tech.name + '</span>';
        btn.title = 'Apply ' + tech.name + ' once';
        btn.addEventListener('click', () => applyTechnique(tech.name));
        list.appendChild(btn);
    });
    const reset = document.createElement('button');
    reset.className = 'step-btn';
    reset.dataset.tech = 'Reset';
    reset.innerHTML = '<span class="step-num">&#8635;</span> <span class="step-tech" style="color:#a33;">Reset</span>';
    reset.title = 'Reset to initial state';
    reset.addEventListener('click', resetPuzzle);
    list.appendChild(reset);
}

function resetPuzzle() {
    if (!currentParsed) return;
    currentState = {
        domains: initDomains(currentParsed.task),
        conditions: currentParsed.conditions,
        size: currentParsed.size,
        task: currentParsed.task
    };
    refreshDisplay();
    document.getElementById('status').textContent = 'Puzzle reset';
    document.getElementById('log').innerHTML = '<div>Puzzle reset. Choose a technique.</div>';
    updateButtonStates();
}

function loadPuzzle() {
    const str = document.getElementById('puzzleInput').value;
    try {
        currentParsed = parsePuzzle(str);
    } catch (e) {
        document.getElementById('status').textContent = 'Parse error!';
        document.getElementById('log').innerHTML = '<div style="color:#c00;">Parse error: ' + e.message + '</div>';
        return;
    }
    currentState = {
        domains: initDomains(currentParsed.task),
        conditions: currentParsed.conditions,
        size: currentParsed.size,
        task: currentParsed.task
    };
    refreshDisplay();
    document.getElementById('status').textContent = currentParsed.size + 'x' + currentParsed.size + ' loaded. Click a technique.';
    document.getElementById('log').innerHTML = '<div>Loaded. Click any technique button to apply it once.</div>';
    updateButtonStates();
}

window.onload = function() {
    document.getElementById('puzzleInput').value = DEFAULT;
    buildTechniqueButtons();
    loadPuzzle();
};
</script>
